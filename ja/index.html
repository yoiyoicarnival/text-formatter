<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>改行削除・テキスト整形ツール｜1秒で1行に</title>
  <meta name="description" content="改行削除、空白削除、句読点変換ができる無料ツール">
  <link rel="stylesheet" href="/style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8865673718352475"
     crossorigin="anonymous"></script>
</head>
<body>

<h1>改行削除・テキスト整形ツール</h1>

<textarea id="input" placeholder="ここにテキストを貼り付け"></textarea>

<div>
  <label><input type="checkbox" id="lineBreak"> 改行削除</label>
  <label><input type="checkbox" id="emptyLine"> 空白行削除</label>
  <label><input type="checkbox" id="punct"> 句読点変換</label>
  <label><input type="checkbox" id="lower"> 小文字化</label>
</div>

<br>

<button onclick="processText()">変換</button>

<textarea id="output" placeholder="結果"></textarea>

<button onclick="copyText()">コピー</button>

</html>
